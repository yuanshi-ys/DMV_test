<html lang="zh-Hans">
<head>

  <title>加州 DMV 中文知识测试练习</title>
  <style>
    :root {

      --line: #d7dde5;
      --accent: #116466;

      --danger: #b42318;

    * { box-sizing: border-box; }
    body {

      color: var(--text);
      line-height: 1.55;
    }
    .app { min-height: 100vh; display: flex; flex-direction: column; }
    header {

      position: sticky;
      top: 0;
      z-index: 3;

      margin: 0 auto;
      padding: 14px 16px;

      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    h1 { font-size: 20px; margin: 0; letter-spacing: 0; }
    .meta { color: var(--muted); font-size: 13px; }
    main { width: 100%; max-width: 980px; margin: 0 auto; padding: 18px 16px 34px; flex: 1; }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      min-height: 44px;
      border-radius: 8px;
      padding: 10px 12px;
      font: inherit;
      font-weight: 650;
      cursor: pointer;

    button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    button.secondary { border-color: var(--accent-2); color: var(--accent-2); }
    button.danger { border-color: #f3b5b0; color: var(--danger); }
    button:disabled { opacity: .45; cursor: not-allowed; }
    button:focus-visible, .choice:focus-visible { outline: 3px solid var(--focus); outline-offset: 2px; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .status {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat {
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
    }
    .stat b { display: block; font-size: 18px; }
    .stat span { color: var(--muted); font-size: 12px; }
    .progress {
      height: 8px;
      background: #e7ebf0;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .progress > div { height: 100%; background: var(--accent-2); width: 0%; transition: width .2s ease; }
    .question-top { display: flex; justify-content: space-between; gap: 12px; align-items: start; margin-bottom: 8px; }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--muted);
      font-size: 12px;
      padding: 4px 9px;
      white-space: nowrap;
    }
    h2 { font-size: 22px; line-height: 1.35; margin: 6px 0 16px; letter-spacing: 0; }
    .choices { display: grid; gap: 10px; }
    .choice {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 13px 14px;
      min-height: 52px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .choice .letter {
      flex: 0 0 28px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      background: #eef2f6;
      color: var(--muted);
      font-weight: 750;
    }
    .choice.correct { border-color: #95d5b2; background: #f0fff4; }
    .choice.correct .letter { background: #d8f3dc; color: var(--ok); }
    .choice.wrong { border-color: #ffb4a8; background: #fff5f3; }
    .choice.wrong .letter { background: #ffe3df; color: var(--danger); }
    .feedback {
      margin-top: 14px;
      border-left: 4px solid var(--accent-2);
      background: #f2fbfc;
      padding: 12px 13px;
      border-radius: 6px;
    }
    .feedback strong { display: block; margin-bottom: 4px; }
    .actions { margin-top: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
    .empty { color: var(--muted); }
    .review-list { margin: 14px 0 0; padding-left: 20px; }
    .review-list li { margin-bottom: 8px; }
    footer { max-width: 980px; margin: 0 auto; color: var(--muted); font-size: 12px; padding: 0 16px 18px; }
    @media (max-width: 720px) {
      .bar { align-items: flex-start; flex-direction: column; }
      .toolbar { grid-template-columns: 1fr 1fr; }
      .status { grid-template-columns: 1fr 1fr; }
      h2 { font-size: 19px; }
    }
    @media (max-width: 430px) {
      .toolbar { grid-template-columns: 1fr; }
      .panel { padding: 14px; }
      .choice { padding: 12px; }
    }
  </style>
</head>

<script>
const QUESTION_BANK = JSON.parse(document.getElementById('question-data').textContent);
const STORAGE_KEY = 'ca-dmv-zh-hans-missed-v1';
const RUN_SIZE = 36;
let state = {
  mode: 'idle',
  run: [],
  index: 0,
  score: 0,
  answered: false,
  selected: null,
  results: []
};

const $ = (id) => document.getElementById(id);
const screen = $('screen');
const letters = ['A', 'B', 'C', 'D'];

function loadMisses() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const parsed = raw ? JSON.parse(raw) : [];
    return new Set(Array.isArray(parsed) ? parsed : []);
  } catch {
    return new Set();
  }
}

function saveMisses(set) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify([...set]));
  updateButtons();
}

function shuffle(items) {
  const arr = [...items];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function updateButtons() {
  const misses = loadMisses();
  $('bankMeta').textContent = `题库 ${QUESTION_BANK.length} 题 · 错题 ${misses.size} 题`;
  $('wrongBtn').disabled = misses.size === 0;
  $('restartBtn').disabled = state.run.length === 0;
  $('clearBtn').disabled = misses.size === 0;
}

function startNormal() {
  state = {
    mode: 'normal',
    run: shuffle(QUESTION_BANK).slice(0, Math.min(RUN_SIZE, QUESTION_BANK.length)),
    index: 0,
    score: 0,
    answered: false,
    selected: null,
    results: []
  };
  renderQuestion();
}

function startWrongOnly() {
  const misses = loadMisses();
  const missedQuestions = QUESTION_BANK.filter(q => misses.has(q.id));
  state = {
    mode: 'wrong',
    run: shuffle(missedQuestions),
    index: 0,
    score: 0,
    answered: false,
    selected: null,
    results: []
  };
  renderQuestion();
}

function restartCurrent() {
  if (!state.run.length) return;
  state = { ...state, index: 0, score: 0, answered: false, selected: null, results: [] };
  renderQuestion();
}

function clearMisses() {
  if (!confirm('确定清空所有错题记录？')) return;
  saveMisses(new Set());
  renderHome();
}

function renderHome() {
  updateButtons();
  const misses = loadMisses();
  screen.innerHTML = `
    <div class="status">
      <div class="stat"><b>${QUESTION_BANK.length}</b><span>总题数</span></div>
      <div class="stat"><b>${RUN_SIZE}</b><span>每套练习</span></div>
      <div class="stat"><b>${misses.size}</b><span>已保存错题</span></div>
      <div class="stat"><b>离线</b><span>无需网络</span></div>
    </div>
    <p>点击“开始36题练习”随机抽题。答题后立即显示正确答案和解释。答错的题会保存在本机浏览器中，之后可用“错题复习”集中练习。</p>
    <p class="empty">建议在考试前多做几轮随机练习，再清掉已掌握的错题。</p>
  `;
}

function renderQuestion() {
  updateButtons();
  if (!state.run.length) {
    screen.innerHTML = '<p class="empty">当前没有可练习的题目。</p>';
    return;
  }
  if (state.index >= state.run.length) {
    renderSummary();
    return;
  }
  const q = state.run[state.index];
  const pct = Math.round((state.index / state.run.length) * 100);
  screen.innerHTML = `
    <div class="status">
      <div class="stat"><b>${state.index + 1} / ${state.run.length}</b><span>当前进度</span></div>
      <div class="stat"><b>${state.score}</b><span>已答对</span></div>
      <div class="stat"><b>${state.results.length - state.score}</b><span>本轮错题</span></div>
      <div class="stat"><b>${state.mode === 'wrong' ? '错题' : '随机'}</b><span>模式</span></div>
    </div>
    <div class="progress"><div style="width:${pct}%"></div></div>
    <div class="question-top">
      <span class="pill">章节 ${q.chapter} · ${q.topic}</span>
      <span class="pill">${q.id}</span>
    </div>
    <h2>${q.question}</h2>
    <div class="choices">
      ${q.choices.map((choice, i) => `<button class="choice" data-index="${i}"><span class="letter">${letters[i]}</span><span>${choice}</span></button>`).join('')}
    </div>
    <div id="feedback"></div>
    <div class="actions">
      <button class="primary" id="nextBtn" disabled>${state.index === state.run.length - 1 ? '查看结果' : '下一题'}</button>
    </div>
  `;
  document.querySelectorAll('.choice').forEach(btn => btn.addEventListener('click', onAnswer));
  $('nextBtn').addEventListener('click', nextQuestion);
}

function onAnswer(event) {
  if (state.answered) return;
  const selected = Number(event.currentTarget.dataset.index);
  const q = state.run[state.index];
  const correct = selected === q.answerIndex;
  state.answered = true;
  state.selected = selected;
  if (correct) state.score += 1;
  state.results.push({ id: q.id, correct });

  const misses = loadMisses();
  if (correct && state.mode === 'wrong') misses.delete(q.id);
  if (!correct) misses.add(q.id);
  saveMisses(misses);

  document.querySelectorAll('.choice').forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.answerIndex) btn.classList.add('correct');
    if (i === selected && !correct) btn.classList.add('wrong');
  });
  const correctText = q.choices[q.answerIndex];
  $('feedback').innerHTML = `
    <div class="feedback">
      <strong>${correct ? '回答正确' : '回答错误'}</strong>
      <div>正确答案：${letters[q.answerIndex]}. ${correctText}</div>
      <div>${q.explanation}</div>
    </div>
  `;
  $('nextBtn').disabled = false;
}

function nextQuestion() {
  state.index += 1;
  state.answered = false;
  state.selected = null;
  renderQuestion();
}

function renderSummary() {
  updateButtons();
  const misses = loadMisses();
  const wrongThisRun = state.results.filter(r => !r.correct).length;
  const accuracy = state.run.length ? Math.round((state.score / state.run.length) * 100) : 0;
  screen.innerHTML = `
    <div class="status">
      <div class="stat"><b>${state.score} / ${state.run.length}</b><span>本轮得分</span></div>
      <div class="stat"><b>${accuracy}%</b><span>正确率</span></div>
      <div class="stat"><b>${wrongThisRun}</b><span>本轮答错</span></div>
      <div class="stat"><b>${misses.size}</b><span>当前错题库</span></div>
    </div>
    <p>${state.mode === 'wrong' ? '错题复习已完成。答对的错题已从错题库移除。' : '本轮练习已完成。答错的题已保存，可继续做错题复习。'}</p>
    <div class="actions">
      <button class="primary" id="againBtn">再做36题</button>
      <button class="secondary" id="summaryWrongBtn" ${misses.size ? '' : 'disabled'}>错题复习</button>
      <button id="reviewBtn">查看本轮错题</button>
    </div>
    <div id="reviewArea"></div>
  `;
  $('againBtn').addEventListener('click', startNormal);
  $('summaryWrongBtn').addEventListener('click', startWrongOnly);
  $('reviewBtn').addEventListener('click', renderRunMistakes);
}

function renderRunMistakes() {
  const wrongIds = new Set(state.results.filter(r => !r.correct).map(r => r.id));
  const wrongQuestions = state.run.filter(q => wrongIds.has(q.id));
  const area = $('reviewArea');
  if (!wrongQuestions.length) {
    area.innerHTML = '<p class="empty">本轮没有错题。</p>';
    return;
  }
  area.innerHTML = `<ol class="review-list">${wrongQuestions.map(q => `<li><strong>${q.question}</strong><br>${q.choices[q.answerIndex]}<br><span class="meta">${q.explanation}</span></li>`).join('')}</ol>`;
}

$('startBtn').addEventListener('click', startNormal);
$('wrongBtn').addEventListener('click', startWrongOnly);
$('restartBtn').addEventListener('click', restartCurrent);
$('clearBtn').addEventListener('click', clearMisses);
renderHome();
</script>
</body>
</html>
